<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AlbertAlert redirect</title>
  <meta http-equiv="refresh" content="0; url=./index.html">
  <script>
    // Relative redirect — works regardless of repo name or deploy path.
    const base = location.pathname.replace(/\/[^/]*$/, '/');
    location.replace(base + 'index.html' + (location.search || '') + (location.hash || ''));
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070914;
      color: #f6f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      border-radius: 24px;
      padding: 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }
    a {
      color: #f2b33d;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening AlbertAlert</h1>
    <p>If you are not redirected automatically, tap below.</p>
    <p><a href="./index.html">Open the app</a></p>
  </div>
</body>
</html>
