name: Feed validation

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'data/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'data/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Ensure package lockfile exists
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --no-audit --no-fund
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate feed data files
        run: npm run validate:feed-data

      - name: Run decision-logic tests
        run: npm test

      - name: Build live alert feed
        run: npm run build:feeds
