name: Feed validation

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'data/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'data/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        if: ${{ env.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK == 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Validate feed data files
        run: npm run validate:feed-data

      - name: Validate London source health
        run: npm run validate:source-health

      - name: Run decision-logic tests
        run: npm test

      - name: Build live alert feed
        run: npm run build:feeds

      - name: Validate generated feed output
        run: npm run validate:live-feed-output
