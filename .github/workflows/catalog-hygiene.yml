name: Catalog hygiene

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: write
  actions: read

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.18.1"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Compile source catalog
        run: npm run compile:sources

      - name: Validate feed data files
        run: npm run validate:feed-data

      - name: Build live alert feed for remediation sweep
        run: npm run build:feeds

      - name: Upload catalog hygiene artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catalog-hygiene-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/source-remediation-sweep.json
            data/top-20-source-remediation.json
            data/quarantined-sources.json
            source-quarantine.html
          if-no-files-found: warn

      - name: Commit catalog hygiene outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/sources.json
          if [ -f data/source-remediation-sweep.json ]; then
            git add data/source-remediation-sweep.json
          fi
          if [ -f data/top-20-source-remediation.json ]; then
            git add data/top-20-source-remediation.json
          fi
          if [ -f data/quarantined-sources.json ]; then
            git add data/quarantined-sources.json
          fi
          if [ -f source-quarantine.html ]; then
            git add source-quarantine.html
          fi
          if git diff --cached --quiet; then
            echo 'No catalog hygiene changes to commit.'
            echo 'CATALOG_HYGIENE_COMMIT_READY=false' >> "$GITHUB_ENV"
            exit 0
          fi
          git commit -m 'Catalog hygiene refresh'

          echo 'CATALOG_HYGIENE_COMMIT_READY=true' >> "$GITHUB_ENV"

      - name: Wait for GitHub Pages deployment slot
        if: env.CATALOG_HYGIENE_COMMIT_READY == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node ./scripts/ci/wait-for-pages-deployment-slot.mjs

      - name: Push catalog hygiene outputs
        if: env.CATALOG_HYGIENE_COMMIT_READY == 'true'
        run: |
          git push
