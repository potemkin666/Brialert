name: Update live feeds

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: brialert-live-feed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-live-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK: ${{ vars.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install feed builder dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        if: ${{ env.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK == 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Validate feed data files
        run: npm run validate:feed-data

      - name: Build live alert feed
        run: npm run build:feeds

      - name: Validate generated feed output
        run: npm run validate:live-feed-output

      - name: Show build output
        if: always()
        run: |
          echo "==== git status before commit ===="
          git status --short
          echo "==== live-alerts head ===="
          head -n 20 live-alerts.json || true
          echo "==== live-alerts modified time ===="
          ls -l live-alerts.json || true

      - name: Build debug bundle
        if: always()
        run: |
          mkdir -p .debug-artifacts
          cat > .debug-artifacts/workflow-context.json <<EOF
          {
            "workflow": "${GITHUB_WORKFLOW}",
            "job": "${GITHUB_JOB}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "ref": "${GITHUB_REF}",
            "sha": "${GITHUB_SHA}",
            "actor": "${GITHUB_ACTOR}",
            "eventName": "${GITHUB_EVENT_NAME}"
          }
          EOF
          git status --short > .debug-artifacts/git-status.txt || true
          git rev-parse HEAD > .debug-artifacts/head-sha.txt || true
          cp live-alerts.json .debug-artifacts/live-alerts.json 2>/dev/null || true
          cp data/quarantined-sources.json .debug-artifacts/quarantined-sources.json 2>/dev/null || true
          cp source-quarantine.html .debug-artifacts/source-quarantine.html 2>/dev/null || true
          cp data/brialert.sqlite .debug-artifacts/brialert.sqlite 2>/dev/null || true
          cp data/sources.json .debug-artifacts/sources.json 2>/dev/null || true
          cp data/geo-lookup.json .debug-artifacts/geo-lookup.json 2>/dev/null || true
          cp package.json .debug-artifacts/package.json 2>/dev/null || true
          cp package-lock.json .debug-artifacts/package-lock.json 2>/dev/null || true

      - name: Upload build debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-feed-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: .debug-artifacts
          if-no-files-found: warn

      - name: Commit refreshed feed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-alerts.json
          if [ -f data/quarantined-sources.json ]; then
            git add data/quarantined-sources.json
          fi
          if [ -f source-quarantine.html ]; then
            git add source-quarantine.html
          fi
          if [ -f data/brialert.sqlite ]; then
            git add data/brialert.sqlite
          fi
          if git diff --cached --quiet; then
            echo 'No feed changes to commit.'
            exit 0
          fi
          git commit -m 'Refresh live alert feed'
          if git push; then
            exit 0
          fi
          echo 'Initial push failed (likely non-fast-forward). Rebasing and retrying once.'
          git fetch origin main
          git pull --rebase origin main
          git push
