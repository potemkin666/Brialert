name: Update live feeds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - data/sources.json
      - scripts/build-live-feed.mjs
      - .github/workflows/update-live-feed.yml
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  build-live-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install feed builder dependencies
        run: npm install

      - name: Build live alert feed
        run: npm run build:feeds

      - name: Commit refreshed feed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-alerts.json
          if git diff --cached --quiet; then
            echo 'No feed changes to commit.'
            exit 0
          fi
          git commit -m 'Refresh live alert feed'
          git push
