name: Update live feeds

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: brialert-live-feed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-live-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Ensure package lockfile exists
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --no-audit --no-fund
          fi

      - name: Install feed builder dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate feed data files
        run: npm run validate:feed-data

      - name: Build live alert feed
        run: npm run build:feeds

      - name: Show build output
        if: always()
        run: |
          echo "==== git status before commit ===="
          git status --short
          echo "==== live-alerts head ===="
          head -n 20 live-alerts.json || true
          echo "==== live-alerts modified time ===="
          ls -l live-alerts.json || true

      - name: Commit refreshed feed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-alerts.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi
          if git diff --cached --quiet; then
            echo 'No feed changes to commit.'
            exit 0
          fi
          git commit -m 'Refresh live alert feed'
          git push
